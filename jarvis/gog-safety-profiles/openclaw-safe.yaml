name: openclaw-safe
description: OpenClaw agent safety profile. Gmail read-only (no send/delete/trash/drafts). Drive read-only (no delete/share/upload/move). Blocks auth writes and config mutations.

version: true
schema: true
exit-codes: true
agent:
  exit-codes: true

# Gmail: read-only, no mutations at all
gmail:
  search: true
  get: true
  messages:
    search: true
    modify: false
  attachment: true
  url: true
  history: true
  thread:
    get: true
    modify: false
    attachments: true
  labels:
    list: true
    get: true
    create: false
    rename: false
    modify: false
    delete: false
    style: false
  batch:
    modify: false
    delete: false
  archive: false
  mark-read: false
  unread: false
  trash: false
  send: false
  autoreply: false
  track: false
  drafts:
    list: true
    get: true
    create: false
    update: false
    delete: false
    send: false
  settings: false
  watch: false
  autoforward: false
  delegates: false
  filters: false
  forwarding: false
  sendas: false
  vacation: false
  forward: false

# Calendar: read-only
calendar:
  calendars: true
  subscribe: false
  acl: true
  alias:
    list: true
    set: false
    unset: false
  events: true
  event: true
  create: false
  update: false
  move: false
  delete: false
  freebusy: true
  respond: false
  propose-time: false
  colors: true
  conflicts: true
  search: true
  time: true
  users: true
  team: true
  focus-time: false
  out-of-office: false
  working-location: false
  create-calendar: false

# Drive: read-only only
drive:
  ls: true
  search: true
  get: true
  download: true
  upload: false
  mkdir: false
  copy: false
  delete: false
  move: false
  rename: false
  share: false
  unshare: false
  permissions: true
  url: true
  drives: true
  comments:
    list: true
    get: true
    create: false
    update: false
    delete: false
    reply: false

# Contacts: read-only
contacts:
  search: true
  list: true
  get: true
  export: true
  create: false
  update: false
  delete: false
  directory:
    list: true
    search: true
  other:
    list: true
    search: true
    delete: false

# Sheets: read-only
sheets:
  get: true
  metadata: true
  export: true
  notes: true
  links: true
  read-format: true
  update-note: false
  named-ranges:
    list: true
    get: true
    add: false
    update: false
    delete: false
  chart:
    list: true
    get: true
    create: false
    update: false
    delete: false

# Docs: read-only (export/cat/info)
docs:
  export: true
  info: true
  cat: true
  list-tabs: true
  structure: true
  comments:
    list: true
    get: true
    add: false
    reply: false
    resolve: false
    delete: false

# Keep: read-only
keep:
  list: true
  get: true
  search: true
  create: false
  delete: false
  attachment: true

# Auth: read status only, no writes
auth:
  credentials:
    list: true
    set: false
    remove: false
  services: true
  list: true
  doctor: true
  alias:
    list: true
    set: false
    unset: false
  status: true
  keyring: false
  add: false
  remove: false
  tokens:
    list: true
    delete: false
    export: false
    import: false
  manage: false
  service-account:
    status: true
    set: false
    unset: false
  keep: false

# Config: read only
config:
  get: true
  keys: true
  list: true
  path: true
  set: false
  unset: false
  no-send:
    list: true
    set: false
    remove: false

# Block these entirely
time: false
classroom: false
admin: false
backup: false
sites: true
people: true
forms: true
groups: true
chat: true
appscript: false
tasks: true

aliases:
  send: false
  ls: true
  search: true
  open: true
  download: true
  upload: false
  login: false
  logout: false
  status: true
  me: true
  whoami: true
